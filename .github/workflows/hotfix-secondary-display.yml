name: Hotfix secondary page display

on:
  push:
    branches:
      - amelioration-positionnement-deontologie-offres
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-secondary-display:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: amelioration-positionnement-deontologie-offres
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch HTML display issues
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const htmlFiles = fs.readdirSync('.')
            .filter(file => file.endsWith('.html'));

          const hotfixCss = `

/* HOTFIX AFFICHAGE PAGES SECONDAIRES
   Le header principal utilise #navbar. Les navigations internes du footer
   ne doivent jamais hériter du position:fixed du header. */
#navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
footer nav,
footer .footer-nav {
  position: static !important;
  inset: auto !important;
  top: auto !important;
  left: auto !important;
  right: auto !important;
  z-index: auto !important;
  padding: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}
img { max-width: 100%; display: block; height: auto; }
.page-hero + div img,
.page-hero-img img {
  width: 100%;
  max-height: 340px;
  object-fit: cover;
}
`;

          let changedFiles = [];

          for (const file of htmlFiles) {
            let content = fs.readFileSync(file, 'utf8');
            const original = content;

            // Scope header nav rules when they exist in secondary pages.
            content = content
              .replace(/(^|\n)nav\{/g, '$1#navbar{')
              .replace(/(^|\n)nav\.scrolled\{/g, '$1#navbar.scrolled{')
              .replace(/const nav = document\.querySelector\('nav'\);/g, "const nav = document.getElementById('navbar');")
              .replace(/window\.addEventListener\('scroll', \(\) => nav\.classList\.toggle\('scrolled', window\.scrollY > 60\), \{passive:true\}\);/g,
                "if (nav) window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60), {passive:true});");

            // Add a final defensive CSS layer once per file.
            if (!content.includes('HOTFIX AFFICHAGE PAGES SECONDAIRES')) {
              content = content.replace('</style>', `${hotfixCss}\n</style>`);
            }

            if (content !== original) {
              fs.writeFileSync(file, content, 'utf8');
              changedFiles.push(file);
            }
          }

          console.log('Patched files:', changedFiles.join(', ') || 'none');
          NODE

      - name: Commit patched files
        run: |
          git config user.name "Procurement Insider Bot"
          git config user.email "loeildelacheteur@gmail.com"
          git add *.html
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
          else
            git commit -m "fix: corrige affichage pages secondaires"
            git push origin amelioration-positionnement-deontologie-offres
          fi
